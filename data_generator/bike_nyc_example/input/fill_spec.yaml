resources:
  tables:
    Stations:
      primary_key: station_id
      pk_column: id
      columns:
      - station_id
      - id
      - name
      - longitude
      - latitude
      - capacity
      - capacity_available
      - bikes_available
      insertable: false
      mutable_columns:
      - bikes_available
      - capacity_available
    Users:
      primary_key: user_id
      pk_column: id
      columns:
      - id
      - user_id
      - first_name
      - last_name
      - email
      - phone
      - credit_card_num
      - is_member
      insertable: true
      id_sequence: true
      where: user_id IS NOT NULL
    Bikes:
      primary_key: bike_id
      pk_column: id
      columns:
      - bike_id
      - id
      - station_id
      - status
      insertable: false
      mutable_columns:
      - station_id
      - status
      where: bike_id IS NOT NULL
events:
  RentBike:
    user_id:
      category: generate
      function_name: choose_or_generate_user
      params:
        probability_new: 0.2
        seeded_max_user_id: 201000
      distribution:
        type: categorical
        values:
          existing: 0.8
          new: 0.2
        bucket_by:
          kind: db_membership
          seeded_max_user_id: 201000
        tolerance: 0.08
    station_id:
      category: select
      function_name: choose_station
      distribution:
        type: uniform_over_column
        table: Stations
        column: station_id
        tolerance: 0.1
    station_name:
      category: lookup
      params:
        table: Stations
        lookup_on: station_id
        where_column: station_id
        value_column: name
      depends_on:
      - station_id
    location_data:
      category: lookup
      params:
        table: Stations
        lookup_on: station_id
        where_column: station_id
        value_columns:
        - longitude
        - latitude
      depends_on:
      - station_id
    credit_card_num:
      category: lookup
      params:
        table: Users
        lookup_on: user_id
        where_column: user_id
        value_column: credit_card_num
      depends_on:
      - user_id
    is_member:
      category: lookup
      params:
        table: Users
        lookup_on: user_id
        where_column: user_id
        value_column: is_member
      depends_on:
      - user_id
    bike_id:
      category: dependent_select
      function_name: choose_available_bike
      depends_on:
      - station_id
      distribution:
        type: uniform_over_column
        table: Bikes
        column: bike_id
        tolerance: 0.1
  ReportLocation:
    user_id:
      category: copy
      source_event: RentBike
      source_attribute: user_id
      match_on: session_id
    bike_id:
      category: copy
      source_event: RentBike
      source_attribute: bike_id
      match_on: session_id
    is_member:
      category: copy
      source_event: RentBike
      source_attribute: is_member
      match_on: session_id
    location_data:
      category: generate
      function_name: generate_report_location
      params:
        max_miles: 40
      depends_on:
      - session_id
  ReturnBike:
    station_id:
      category: generate
      function_name: choose_return_station
      params:
        max_miles: 40
      depends_on:
      - session_id
      - bike_id
      distribution:
        type: uniform_over_column
        table: Stations
        column: station_id
        tolerance: 0.1
    station_name:
      category: lookup
      params:
        table: Stations
        lookup_on: station_id
        where_column: station_id
        value_column: name
      depends_on:
      - station_id
    location_data:
      category: lookup
      params:
        table: Stations
        lookup_on: station_id
        where_column: station_id
        value_columns:
        - longitude
        - latitude
      depends_on:
      - station_id
    user_id:
      category: copy
      source_event: RentBike
      source_attribute: user_id
      match_on: session_id
    bike_id:
      category: copy
      source_event: RentBike
      source_attribute: bike_id
      match_on: session_id
    credit_card_num:
      category: copy
      source_event: RentBike
      source_attribute: credit_card_num
      match_on: session_id
    is_member:
      category: copy
      source_event: RentBike
      source_attribute: is_member
      match_on: session_id
